<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none';">
    <title>角色房间 — Date Night Girl</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a class="skip-link" href="#room-content">跳到主要内容</a>
    <div id="room">
        <aside class="sidebar" aria-label="角色房间导航">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false">
                        <path d="M3 11.5 12 4l9 7.5"></path>
                        <path d="M5.5 10.5V20h13v-9.5"></path>
                        <path d="M9.5 20v-5h5v5"></path>
                    </svg>
                </span>
                <span class="brand-copy">
                    <strong>小糖的房间</strong>
                    <small>陪伴状态中心</small>
                </span>
            </div>

            <nav class="tabs" role="tablist" aria-label="房间功能">
                <button class="tab active" id="tab-stats" type="button" role="tab"
                        data-tab="stats" aria-controls="panel-stats" aria-selected="true" tabindex="0">
                    <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M4 19V9"></path><path d="M10 19V5"></path><path d="M16 19v-7"></path><path d="M22 19H2"></path>
                    </svg>
                    <span>状态</span>
                </button>
                <button class="tab" id="tab-achievements" type="button" role="tab"
                        data-tab="achievements" aria-controls="panel-achievements" aria-selected="false" tabindex="-1">
                    <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M8 21h8"></path><path d="M12 17v4"></path><path d="M7 4h10v5a5 5 0 0 1-10 0Z"></path><path d="M7 6H4v2a4 4 0 0 0 4 4"></path><path d="M17 6h3v2a4 4 0 0 1-4 4"></path>
                    </svg>
                    <span>成就</span>
                </button>
                <button class="tab" id="tab-outfits" type="button" role="tab"
                        data-tab="outfits" aria-controls="panel-outfits" aria-selected="false" tabindex="-1">
                    <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="m8 4 4 2 4-2 4 4-3 3v9H7v-9L4 8Z"></path><path d="M10 5a2 2 0 0 0 4 0"></path>
                    </svg>
                    <span>服装</span>
                </button>
                <button class="tab" id="tab-feed" type="button" role="tab"
                        data-tab="feed" aria-controls="panel-feed" aria-selected="false" tabindex="-1">
                    <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M4 11h16a8 8 0 0 1-16 0Z"></path><path d="M8 7c0-1 1-2 1-3"></path><path d="M12 7c0-1 1-2 1-3"></path><path d="M16 7c0-1 1-2 1-3"></path>
                    </svg>
                    <span>互动</span>
                </button>
                <button class="tab" id="tab-settings" type="button" role="tab"
                        data-tab="settings" aria-controls="panel-settings" aria-selected="false" tabindex="-1">
                    <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06-2.83 2.83-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21h-4v-.1A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06-2.83-2.83.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3v-4h.1A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06 2.83-2.83.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3h4v.1A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.88-.34l.06-.06 2.83 2.83-.06.06A1.7 1.7 0 0 0 19.4 9c.38.26.72.6 1 1 .24.33.4.72.4 1.1v.1h.1v1.6h-.1v.1c0 .38-.16.77-.4 1.1-.28.4-.62.74-1 1Z"></path>
                    </svg>
                    <span>设置</span>
                </button>
            </nav>

            <p class="sidebar-note">桌面宠物右键菜单也可以打开这里。</p>
        </aside>

        <main class="content" id="room-content" tabindex="-1">
            <section class="panel active" id="panel-stats" data-panel="stats" role="tabpanel" aria-labelledby="tab-stats"></section>
            <section class="panel" id="panel-achievements" data-panel="achievements" role="tabpanel" aria-labelledby="tab-achievements" hidden></section>
            <section class="panel" id="panel-outfits" data-panel="outfits" role="tabpanel" aria-labelledby="tab-outfits" hidden></section>
            <section class="panel" id="panel-feed" data-panel="feed" role="tabpanel" aria-labelledby="tab-feed" hidden></section>
            <section class="panel" id="panel-settings" data-panel="settings" role="tabpanel" aria-labelledby="tab-settings" hidden></section>
        </main>
    </div>
    <div class="live-status" id="room-status" role="status" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="room.js"></script>
</body>
</html>
