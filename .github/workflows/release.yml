name: Signed Windows release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag matching package.json (for example v1.0.0)
        required: true
        type: string
      channel:
        description: Update channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - beta

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    environment: production
    timeout-minutes: 45
    env:
      RELEASE_PROVIDER: github
      RELEASE_CHANNEL: ${{ inputs.channel || (contains(github.ref_name, '-beta') && 'beta') || 'stable' }}
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      ALLOW_SELF_SIGNED_RELEASE: ${{ vars.ALLOW_SELF_SIGNED_RELEASE || 'false' }}
      NPM_CONFIG_FUND: 'false'

    steps:
      - name: Check out exact source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Trust opt-in self-signed certificate
        if: env.ALLOW_SELF_SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK) -or
              [string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            throw 'Self-signed release mode requires WIN_CSC_LINK and WIN_CSC_KEY_PASSWORD.'
          }

          try {
            $pfxBytes = [Convert]::FromBase64String($env:WIN_CSC_LINK)
            $certificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $pfxBytes,
              $env:WIN_CSC_KEY_PASSWORD,
              [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet
            )
          } catch {
            throw 'Unable to load the self-signed release certificate from the configured secrets.'
          }

          if ($certificate.Subject -ne $certificate.Issuer) {
            throw 'ALLOW_SELF_SIGNED_RELEASE only accepts a self-signed certificate.'
          }
          $codeSigningOid = '1.3.6.1.5.5.7.3.3'
          $hasCodeSigningEku = $certificate.Extensions |
            Where-Object { $_ -is [Security.Cryptography.X509Certificates.X509EnhancedKeyUsageExtension] } |
            ForEach-Object { $_.EnhancedKeyUsages } |
            Where-Object { $_.Value -eq $codeSigningOid }
          if (-not $hasCodeSigningEku) {
            throw 'The self-signed certificate is not valid for code signing.'
          }

          $publicCertificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
            $certificate.Export([Security.Cryptography.X509Certificates.X509ContentType]::Cert)
          )
          foreach ($storeName in @('Root', 'TrustedPublisher')) {
            $store = [Security.Cryptography.X509Certificates.X509Store]::new(
              $storeName,
              [Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
            )
            try {
              $store.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
              $store.Add($publicCertificate)
            } finally {
              $store.Close()
            }
          }
          "LOCAL_SIGNING_THUMBPRINT=$($publicCertificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Run quality gates
        run: |
          npm test
          npm run manifest:check
          npm audit --audit-level=high

      - name: Build and verify signed release
        run: npm run release:win

      - name: Preserve release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: DateNightGirl-${{ env.RELEASE_TAG }}-windows
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
            dist/beta.yml
            dist/release-checksums.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $files = Get-ChildItem -LiteralPath dist -File | Where-Object {
            $_.Name -match '\.exe$' -or
            $_.Name -match '\.exe\.blockmap$' -or
            $_.Name -in @('latest.yml', 'beta.yml', 'release-checksums.sha256')
          }
          $flags = @('--verify-tag', '--generate-notes', '--title', "Date Night Girl $env:RELEASE_TAG")
          if ($env:RELEASE_CHANNEL -eq 'beta') { $flags += '--prerelease' }
          gh release create $env:RELEASE_TAG $files.FullName @flags

      - name: Remove opt-in self-signed trust
        if: always() && env.ALLOW_SELF_SIGNED_RELEASE == 'true'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LOCAL_SIGNING_THUMBPRINT)) { exit 0 }
          foreach ($storeName in @('Root', 'TrustedPublisher')) {
            $store = [Security.Cryptography.X509Certificates.X509Store]::new(
              $storeName,
              [Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
            )
            try {
              $store.Open([Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
              $matches = $store.Certificates.Find(
                [Security.Cryptography.X509Certificates.X509FindType]::FindByThumbprint,
                $env:LOCAL_SIGNING_THUMBPRINT,
                $false
              )
              foreach ($match in $matches) { $store.Remove($match) }
            } finally {
              $store.Close()
            }
          }
